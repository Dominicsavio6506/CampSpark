{% extends "base.html" %}
{% block content %}

<h2>📊 Exam Results — {{ student.name }}</h2>

<table border="1" cellpadding="8">
<tr>
  <th>Exam</th>
  <th>Subject</th>
  <th>Total Marks</th>
  <th>Grade</th>
</tr>

{% for m in marks %}
<tr>
  <td>{{ m.exam }}</td>
  <td>{{ m.subject }}</td>
  <td>{{ m.total }}</td>
  <td>{{ m.grade }}</td>
</tr>
{% empty %}
<tr>
  <td colspan="4">No exam results uploaded yet</td>
</tr>
{% endfor %}

</table>

{% endblock %}
