{% extends "base.html" %}
{% block content %}

<h2>📊 GPA Report — {{ student.name }}</h2>

<h3>GPA: {{ gpa }}</h3>

<table border="1">
<tr>
<th>Subject</th>
<th>Total</th>
<th>Grade</th>
</tr>

{% for m in marks %}
<tr>
<td>{{ m.subject }}</td>
<td>{{ m.total }}</td>
<td>{{ m.grade }}</td>
</tr>
{% endfor %}
</table>

{% endblock %}
