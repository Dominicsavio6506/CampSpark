<!DOCTYPE html>
<html>
<head>
<title>My Scholarships</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    font-family: "Segoe UI", system-ui;
}
.card {
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}
</style>

</head>
<body>

<div class="container mt-4">

<h3 class="mb-3">🎓 My Scholarships</h3>

<div class="card p-3">

<table class="table table-hover">
<thead class="table-dark">
<tr>
<th>Title</th>
<th>Amount</th>
<th>Semester</th>
<th>Status</th>
</tr>
</thead>

<tbody>
{% for s in scholarships %}
<tr>
<td>{{ s.title }}</td>
<td>₹{{ s.amount }}</td>
<td>{{ s.semester }}</td>
<td>
<span class="badge 
{% if s.status == 'Approved' %}bg-success
{% elif s.status == 'Pending' %}bg-warning
{% else %}bg-danger{% endif %}">
{{ s.status }}
</span>
</td>
</tr>
{% empty %}
<tr>
<td colspan="4" class="text-center text-muted">No scholarships found</td>
</tr>
{% endfor %}
</tbody>
</table>

</div>

<a href="/student/" class="btn btn-outline-primary mt-3">← Back to Dashboard</a>

</div>

</body>
</html>
