{% extends "base.html" %}
{% block content %}

<style>
  .notif-wrapper {
    max-width: 900px;
    margin: 30px auto;
  }

  .notif-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .notif-header h2 {
    margin: 0;
    font-weight: 600;
    color: #111827;
  }

  .notif-card {
    background: #ffffff;
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    display: flex;
    gap: 14px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .notif-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 26px rgba(0,0,0,0.12);
  }

  .notif-indicator {
    width: 6px;
    border-radius: 4px;
    background: #2563eb;
  }

  .notif-content {
    flex: 1;
  }

  .notif-title {
    font-size: 16px;
    font-weight: 600;
    color: #111827;
    margin-bottom: 4px;
  }

  .notif-message {
    font-size: 14px;
    color: #374151;
    margin-bottom: 6px;
  }

  .notif-meta {
    font-size: 12px;
    color: #6b7280;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .notif-meta a {
    color: #2563eb;
    font-weight: 500;
    text-decoration: none;
  }

  .notif-meta a:hover {
    text-decoration: underline;
  }

  .notif-read .notif-indicator {
    background: #d1d5db;
  }

  .empty-box {
    text-align: center;
    padding: 40px;
    color: #6b7280;
    background: #f9fafb;
    border-radius: 14px;
  }
</style>

<div class="notif-wrapper">

  <div class="notif-header">
    <span style="font-size:22px">🔔</span>
    <h2>My Notifications</h2>
  </div>

  {% for n in notifications %}
    <div class="notif-card {% if n.is_read %}notif-read{% endif %}">

      <div class="notif-indicator"></div>

      <div class="notif-content">
        <div class="notif-title">
          {{ n.notification.title }}
        </div>

        <div class="notif-message">
          {{ n.notification.message }}
        </div>

        <div class="notif-meta">
          <span>{{ n.notification.created_at }}</span>

          {% if not n.is_read %}
            <a href="{% url 'mark_as_read' n.id %}">Mark as read</a>
          {% endif %}
        </div>
      </div>

    </div>
  {% empty %}
    <div class="empty-box">
      No notifications yet 🚀
    </div>
  {% endfor %}

</div>

{% endblock %}
