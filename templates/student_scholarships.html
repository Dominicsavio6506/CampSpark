<!DOCTYPE html>
<html>
<head>
<title>My Scholarships</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

<h3>🎓 My Scholarships</h3>

<table class="table table-bordered mt-3">
<thead class="table-dark">
<tr>
<th>Title</th>
<th>Amount</th>
<th>Semester</th>
<th>Status</th>
</tr>
</thead>

<tbody>
{% for s in scholarships %}
<tr>
<td>{{ s.title }}</td>
<td>₹{{ s.amount }}</td>
<td>{{ s.semester }}</td>
<td>
<span class="badge 
{% if s.status == 'Approved' %}bg-success
{% elif s.status == 'Pending' %}bg-warning
{% else %}bg-danger{% endif %}">
{{ s.status }}
</span>
</td>
</tr>
{% empty %}
<tr>
<td colspan="4" class="text-center">No scholarships found</td>
</tr>
{% endfor %}
</tbody>
</table>

</div>
</body>
</html>
