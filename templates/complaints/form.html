<!DOCTYPE html>
<html>
<head>
  <title>Raise Complaint</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e9eef3, #d8e2ec);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .card {
      background: white;
      width: 420px;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      animation: fadeIn 0.4s ease-in-out;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
      color: #333;
    }

    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      box-sizing: border-box;   /* IMPORTANT */
      display: block;
      margin-left: auto;
      margin-right: auto;
    }


    input:focus, textarea:focus {
      border-color: #007bff;
      box-shadow: 0 0 4px rgba(0,123,255,0.4);
    }

    textarea {
      resize: none;
      height: 100px;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #0056b3;
    }

    .success {
      text-align: center;
      color: green;
      margin-top: 10px;
      display: none;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(10px);}
      to {opacity:1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Raise Complaint</h2>

  <form id="cform">
    <input name="title" placeholder="Complaint Title" required>
    <textarea name="description" placeholder="Describe your issue..." required></textarea>
    <button type="submit">Submit Complaint</button>
  </form>

  <div class="success" id="msg">Complaint Submitted Successfully ✔</div>
</div>

<script>
document.getElementById('cform').onsubmit = async e => {
  e.preventDefault();
  const f = e.target;

  await fetch('/complaints/api/complaints/', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      title: f.title.value,
      description: f.description.value
    })
  });

  document.getElementById('msg').style.display = 'block';
  f.reset();
};
</script>

</body>
</html>
