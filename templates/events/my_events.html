{% extends "base.html" %}
{% block content %}

<style>
.my-events-wrapper{
    max-width:900px;
}

.main-title{
    font-size:28px;
    font-weight:700;
    color:#a78bfa;
    margin-bottom:25px;
}

.event-card{
    background: linear-gradient(145deg,#0f172a,#111827);
    border-radius:18px;
    padding:20px;
    margin-bottom:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.35);
    transition:0.2s;
}

.event-card:hover{
    transform: translateY(-3px);
}

.event-title{
    font-size:22px;
    font-weight:700;
    margin-bottom:10px;
    color:white;
}

.meta{
    color:#cbd5e1;
    margin-bottom:12px;
}

.view-btn{
    display:inline-block;
    padding:10px 16px;
    background:#7c3aed;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
}

.view-btn:hover{
    opacity:0.9;
}
.empty-box{
    background:#1e293b;
    padding:18px;
    border-radius:12px;
    color:#94a3b8;
}
</style>

<div class="my-events-wrapper">

<h2 class="main-title">👨‍🏫 My Events</h2>

{% for event in my_events %}
<div class="event-card">

  <div class="event-title">
      {{ event.title }}
  </div>

  <div class="meta">
      {{ event.type }} | {{ event.date }}
  </div>

  <a href="{% url 'event_detail' event.id %}" class="view-btn">
      View Details
  </a>

</div>
{% empty %}
<div class="empty-box">
    No assigned events yet.
</div>
{% endfor %}

</div>

{% endblock %}
