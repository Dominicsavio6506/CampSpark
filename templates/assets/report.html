{% extends "base.html" %}
{% block content %}
<h2>🧾 Report Asset Issue</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="asset-btn">Submit Issue</button>
</form>
<a href="/dashboard/" class="back-btn">⬅ Back</a>
<style>.back-btn{
    display:inline-block;
    margin-bottom:15px;
    padding:8px 16px;
    background:#334155;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:600;
}

.back-btn:hover{
    background:#475569;
}</style>
{% endblock %}
