<!DOCTYPE html>
<html>
<head>
<title>CampSpark Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Pacifico&display=swap" rel="stylesheet">

<style>

body {
    margin:0;
    font-family:'Inter', sans-serif;
    min-height:100vh;
    background: linear-gradient(120deg, #050b18 50%, #086a977c 50%);
    color: white;
    overflow-y: auto;
}

html, body {
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden;
}


/* Floating Bubble Particles */
.particle {
    position: absolute;
    width: 10px;
    height: 10px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    filter: blur(1px);
    animation: floatParticle 14s infinite linear;
}

/* LEFT PANEL */
.left-panel {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    padding: 60px;
}

/* Signature Brand */
.brand-signature {
    font-family: "Pacifico", cursive;
    font-size: 52px;
    letter-spacing: 1px;
    color: #9ee7ff;
    text-shadow: 0 0 20px rgba(79,172,254,0.6);
}

.brand-sub {
    margin-top: 12px;
    font-size: 16px;
    opacity: 0.8;
}

/* RIGHT PANEL */
.right-panel {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    min-height: 100vh;
}

/* Animated White Glow Background */
.glow-bg {
    position: absolute;
    width: 460px;
    height: 460px;
    background: radial-gradient(circle, rgba(255,255,255,0.35), transparent 65%);
    filter: blur(80px);
    animation: pulseGlow 6s infinite alternate ease-in-out;
}

/* Login Box */
.login-box {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 350px;
    padding: 25px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(18px);
    border-radius: 18px;
    box-shadow: 0 0 45px rgba(79,172,254,0.4);
}

/* Title */
.login-box h2 {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 8px;
}
.login-container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

/* Inputs */
input {
    width: 100%;
    padding: 14px;
    margin-top: 14px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 14px;
}

/* Input glow */
input:focus {
    box-shadow: 0 0 15px rgba(79,172,254,0.6);
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    margin-top: 22px;
    border-radius: 12px;
    border: none;
    font-weight: 700;
    background: linear-gradient(135deg, #00f2fe, #4facfe);
    color: black;
    cursor: pointer;
    transition: 0.2s ease;
    position: relative;
}

button:hover {
    box-shadow: 0 0 18px rgba(79,172,254,0.6);
}

button:active {
    transform: scale(0.97);
}

/* Loading Spinner */
button.loading {
    pointer-events: none;
    color: transparent;
}

button.loading::after {
    content: "";
    width: 18px;
    height: 18px;
    border: 3px solid rgba(255,255,255,0.5);
    border-top-color: white;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: spin 0.8s linear infinite;
}

/* Error */
.error {
    margin-top: 12px;
    color: #ff6b6b;
    font-size: 14px;
}

.background-shape {
  height: 100%;
  max-height: 100vh;
}

.main-wrapper {
  display: flex;
  width: 100%;
  min-height: 100vh;
}

/* Animations */
@keyframes pulseGlow {
    from { transform: scale(0.9); opacity: 0.5; }
    to { transform: scale(1.1); opacity: 0.9; }
}

@keyframes floatParticle {
    from { transform: translateY(110vh) scale(0.8); opacity: 0.2; }
    to { transform: translateY(-15vh) scale(1.3); opacity: 0.8; }
}

@keyframes spin {
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

@media (max-width: 768px) {

  .main-wrapper {
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .left-panel {
    display: flex;
    padding: 10px 0 10px 0;
  }

  .right-panel {
    padding: 10px;
    width: 100%;
  }

  .login-box {
    max-width: none;
    width: 92%;
    padding: 10px;
  }

  .brand-signature {
    font-size: 34px;
  }

  .particle { display:none; }

  .brand-sub {
    font-size: 13px;
   } 
 
}



</style>
</head>

<body>
<div class="main-wrapper">
<!-- Floating Bubbles -->
<div class="particle" style="left:6%; animation-delay:0s;"></div>
<div class="particle" style="left:14%; animation-delay:2s;"></div>
<div class="particle" style="left:24%; animation-delay:4s;"></div>
<div class="particle" style="left:38%; animation-delay:6s;"></div>
<div class="particle" style="left:52%; animation-delay:3s;"></div>
<div class="particle" style="left:66%; animation-delay:5s;"></div>
<div class="particle" style="left:78%; animation-delay:7s;"></div>
<div class="particle" style="left:88%; animation-delay:9s;"></div>

<!-- LEFT BRAND -->
<div class="left-panel">
    <div class="brand-signature">CampSpark</div>
    <div class="brand-sub">Smart Campus Platform</div>
</div>

<!-- RIGHT LOGIN -->
<div class="right-panel">

    <div class="glow-bg"></div>

    <form class="login-box" method="POST">
        {% csrf_token %}
        <h2>Sign In</h2>

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit" id="loginBtn">Continue</button>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </form>

</div>

<script>
const btn = document.getElementById("loginBtn");

btn.addEventListener("click", function() {
    btn.classList.add("loading");
});
</script>
</div>
</body>
</html>
